<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Cards</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #eee;
    font-family: Arial;
}

.card-box {
    width: 320px;
    border-radius: 10px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    margin: 20px;
}

.car-img {
    width: 100%;
    height: 200px;
    object-fit: contain;
    background: #f5f5f5;
}

.card-body {
    color: white;
    padding: 20px;
    transition: 0.3s;
}

.price del {
    color: #ddd;
    margin-left: 10px;
}

.color-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    cursor: pointer;
    border: 2px solid white;
}

.btn-cart {
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="d-flex justify-content-center flex-wrap">

    <!-- CARD 1 -->
    <div class="card-box">
        <img id="carImage1" class="car-img" src="./images/red.png">

        <div id="cardTheme1" class="card-body" style="background:#e53935;">
            <h5>Mercedes Benz c300 2022</h5>

            <p>🚗 Mileage: 4,000 miles</p>
            <p>⛽ Fuel: 25mpg</p>
            <p>⭐ Safety: ★★★★★</p>

            <p>Pick a color:</p>

            <div>
                <span class="color-dot" style="background:red"
                    onclick="changeCar(1,'red')"></span>

                <span class="color-dot" style="background:black"
                    onclick="changeCar(1,'black')"></span>

                <span class="color-dot" style="background:rgb(255, 242, 0)"
                    onclick="changeCar(1,'yellow')"></span>

                <span class="color-dot" style="background:gray"
                    onclick="changeCar(1,'gray')"></span>
            </div>

            <h4 class="price mt-2">
                $134,450 <del>$140,500</del>
            </h4>

            <button class="btn btn-dark btn-cart">Add to Cart</button>
        </div>
    </div>

    <!-- CARD 2 -->
    <div class="card-box">
        <img id="carImage2" class="car-img" src="./images/black.png">

        <div id="cardTheme2" class="card-body" style="background:#212121;">
            <h5>Mercedes Benz c300 2022</h5>

            <p>🚗 Mileage: 4,000 miles</p>
            <p>⛽ Fuel: 25mpg</p>
            <p>⭐ Safety: ★★★★★</p>

            <p>Pick a color:</p>

            <div>
                <span class="color-dot" style="background:red"
                    onclick="changeCar(2,'red')"></span>

                <span class="color-dot" style="background:black"
                    onclick="changeCar(2,'black')"></span>

                <span class="color-dot" style="background:rgb(255, 242, 0)"
                    onclick="changeCar(2,'yellow')"></span>

                <span class="color-dot" style="background:gray"
                    onclick="changeCar(2,'gray')"></span>
            </div>

            <h4 class="price mt-2">
                $134,450 <del>$140,500</del>
            </h4>

            <button class="btn btn-dark btn-cart">Add to Cart</button>
        </div>
    </div>

</div> 

<script>
function changeCar(cardNumber, color) {

    let img = document.getElementById("carImage" + cardNumber);
    let card = document.getElementById("cardTheme" + cardNumber);

    if (color === "red") {
        img.src = "./images/red.png";
        card.style.background = "#e53935";
    }
    else if (color === "black") {
        img.src = "./images/black.png";
        card.style.background = "#212121";
    }
    else if (color === "yellow") {
        img.src = "./images/yellow.png";
        card.style.background = "#FFC107";
    }
    else if (color === "gray") {
        img.src = "./images/gray.png";
        card.style.background = "#616161";
    }
}
</script>
   
</body>
</html>
