<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Counter App</title>

  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <div class="counter-container">
    <h2>Counter</h2>

    <!-- Counter Value -->
    <h1 id="count">0</h1>

    <!-- Buttons -->
    <button class="add" onclick="increase()">+1</button>
    <button class="subtract" onclick="decrease()">-1</button>
    <button class="reset" onclick="reset()">Reset</button>
  </div>

  <script src="./script.js"></script>

</body>
</html>
