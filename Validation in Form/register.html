<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    border-radius: 15px;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.95);
}

.form-control {
    border-radius: 10px;
}

.btn-custom {
    border-radius: 10px;
    background: #667eea;
    color: white;
}

.btn-custom:hover {
    background: #5a67d8;
}
</style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow p-4">

                <h3 class="text-center mb-3">🎓 Student Registration</h3>

                <input type="text" id="username" class="form-control mb-2" placeholder="Username">
                <input type="email" id="email" class="form-control mb-2" placeholder="Email">
                <input type="password" id="password" class="form-control mb-2" placeholder="Password">
                <input type="password" id="confirmPassword" class="form-control mb-3" placeholder="Confirm Password">

                <button class="btn btn-custom w-100" onclick="register()">Register</button>

                <p class="text-center mt-3">
                    Already have an account?
                    <a href="login.html">Login</a>
                </p>

            </div>
        </div>
    </div>
</div>

<script>
function register() {

    let username = document.getElementById("username").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;

    let userPattern = /^[a-zA-Z0-9]{6,}$/;
    if (!userPattern.test(username))
        return alert("Username must be 6+ characters");

    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (!emailPattern.test(email))
        return alert("Invalid email");

    if (password.length < 8)
        return alert("Password must be 8+ characters");

    if (password !== confirmPassword)
        return alert("Passwords do not match");

    localStorage.setItem("username", username);
    localStorage.setItem("email", email);
    localStorage.setItem("password", password);

    alert("Registration Successful!");
    window.location.href = "login.html";
}
</script>

</body>
</html>
