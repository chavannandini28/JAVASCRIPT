<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    height: 100vh;
    background: linear-gradient(135deg, #43e97b, #38f9d7);
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    border-radius: 15px;
    background: rgba(255,255,255,0.95);
}

.btn-login {
    background: #28a745;
    color: white;
    border-radius: 10px;
}

.btn-login:hover {
    background: #218838;
}
</style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow p-4">
                <h3 class="text-center mb-3">🔐 Student Login</h3>

                <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Email">
                <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Password">

                <button class="btn btn-login w-100" onclick="login()">Login</button>

                <p class="text-center mt-3">
                    New user?
                    <a href="register.html">Register</a>
                </p>
            </div>

        </div>
    </div>
</div>

<script>
function login() {
    let email = document.getElementById("loginEmail").value;
    let password = document.getElementById("loginPassword").value;

    let storedEmail = localStorage.getItem("email");
    let storedPassword = localStorage.getItem("password");

    if (email === storedEmail && password === storedPassword) {
        alert("Login Successful!");
        window.location.href = "home.html";
    } else {
        alert("Invalid Email or Password");
    }
}
</script>

</body>
</html>
